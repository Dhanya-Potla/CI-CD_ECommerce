name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, product-service, order-service]
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          npm install
      - name: Run Tests
        run: |
          cd ${{ matrix.service }}
          npm test

  build-images:
    name: Build Docker Images (Local Verify)
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, product-service, order-service, frontend]
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: |
          cd ${{ matrix.service }}
          docker build -t local-${{ matrix.service }}:latest .
