version: '3.8'

services:
  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - user-service
      - product-service
      - order-service
